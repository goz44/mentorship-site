<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentorship System</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

#loginScreen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index: 100;
}

.login-box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  text-align: center;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin:20px;
}

textarea, select, input{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  box-sizing: border-box;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}
</style>
</head>

<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>Login</h2>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="loginApp()">Enter</button>
  </div>
</div>

<div id="appContainer" style="display:none">

  <div class="card">
    <h2>📦 Daily Report</h2>

    <select id="weekSelect">
      <option>Week 1</option>
      <option>Week 2</option>
      <option>Week 3</option>
    </select>

    <textarea id="industry" placeholder="Industry..."></textarea>
    <textarea id="business" placeholder="Business..."></textarea>
    <textarea id="growth" placeholder="Growth..."></textarea>

    <button onclick="saveReport()">Save</button>
    <button onclick="loadReports()">Load</button>
  </div>

  <div id="list"></div>

  <div class="card">
    <h3>📊 Radar Chart</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB8OgrYt4vvC92Gu-MFzMY5khZDLHeqneY",
  authDomain: "goz44-2e14c.firebaseapp.com",
  projectId: "goz44-2e14c",
  storageBucket: "goz44-2e14c.firebasestorage.app",
  messagingSenderId: "819051445534",
  appId: "1:819051445534:web:b6afa5ca388b16f4975d0f",
  measurementId: "G-MTVJ35E06H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.loginApp = function(){
  const password = document.getElementById('pass').value;
  if(password === "1234"){
    document.getElementById('loginScreen').style.display = "none";
    document.getElementById('appContainer').style.display = "block";
    initChart();
  } else {
    alert("Wrong password!");
  }
}

/* SAVE */
window.saveReport = async function(){
  try {
    const week = document.getElementById('weekSelect').value;
    const ind = document.getElementById('industry').value;
    const bus = document.getElementById('business').value;
    const gro = document.getElementById('growth').value;

    await addDoc(collection(db, "reports"), {
      industry: ind,
      business: bus,
      growth: gro,
      week: week,
      reviewed: false,
      comment: "",
      time: Date.now()
    });

    alert("Saved successfully!");
    document.getElementById('industry').value = "";
    document.getElementById('business').value = "";
    document.getElementById('growth').value = "";
  } catch (e) {
    console.error("Error saving: ", e);
    alert("Error saving report");
  }
}

/* LOAD */
window.loadReports = async function(){
  const selectedWeek = document.getElementById('weekSelect').value;
  const listDiv = document.getElementById('list');
  const q = await getDocs(collection(db, "reports"));

  listDiv.innerHTML = "";

  q.forEach(docSnap => {
    const data = docSnap.data();
    if(data.week !== selectedWeek) return;

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <p><b>Industry:</b> ${data.industry}</p>
      <p><b>Business:</b> ${data.business}</p>
      <p><b>Growth:</b> ${data.growth}</p>
      <p>Status: ${data.reviewed ? "✅ Reviewed" : "❌ Not reviewed"}</p>
      <textarea id="c-${docSnap.id}" placeholder="Mentor comment">${data.comment || ""}</textarea>
      <button onclick="reviewReport('${docSnap.id}')">Review</button>
    `;
    listDiv.appendChild(div);
  });
}

/* REVIEW */
window.reviewReport = async function(id){
  const commentValue = document.getElementById(`c-${id}`).value;
  await updateDoc(doc(db, "reports", id), {
    reviewed: true,
    comment: commentValue
  });
  alert("Reviewed!");
  loadReports();
}

/* CHART */
import "https://cdn.jsdelivr.net/npm/chart.js";

function initChart() {
  const ctx = document.getElementById('chart');
  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['Industry', 'Business', 'Growth'],
      datasets: [{
        label: 'Skill Level',
        data: [3, 4, 5],
        backgroundColor: 'rgba(59, 130, 246, 0.2)',
        borderColor: '#3b82f6',
        color: '#fff'
      }]
    },
    options: {
      scales: {
        r: {
          grid: { color: 'rgba(255,255,255,0.1)' },
          pointLabels: { color: '#fff' }
        }
      }
    }
  });
}
</script>

</body>
</html>
