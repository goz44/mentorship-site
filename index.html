<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentorship System</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

#login{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin:20px;
}

textarea, select{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input type="password" id="pass" placeholder="password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="card">
    <h2>📦 Daily Report</h2>

    <select id="weekSelect">
      <option>Week 1</option>
      <option>Week 2</option>
      <option>Week 3</option>
    </select>

    <textarea id="industry" placeholder="Industry..."></textarea>
    <textarea id="business" placeholder="Business..."></textarea>
    <textarea id="growth" placeholder="Growth..."></textarea>

    <button onclick="save()">Save</button>
    <button onclick="load()">Load</button>
  </div>

  <div id="list"></div>

  <div class="card">
    <h3>📊 Radar Chart</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (ӨӨРИЙНХӨӨ СОЛИНО) */
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB8OgrYt4vvC92Gu-MFzMY5khZDLHeqneY",
  authDomain: "goz44-2e14c.firebaseapp.com",
  projectId: "goz44-2e14c",
  storageBucket: "goz44-2e14c.firebasestorage.app",
  messagingSenderId: "819051445534",
  appId: "1:819051445534:web:b6afa5ca388b16f4975d0f",
  measurementId: "G-MTVJ35E06H"
};
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.login = function(){
  if(document.getElementById('pass').value==="1234"){
    login.style.display="none";
    app.style.display="block";
  } else alert("wrong password");
}

/* SAVE */
window.save = async function(){
  const week = weekSelect.value;

  await addDoc(collection(db,"reports"),{
    industry:industry.value,
    business:business.value,
    growth:growth.value,
    week:week,
    reviewed:false,
    comment:"",
    time:Date.now()
  });

  alert("saved");
}

/* LOAD + FILTER */
window.load = async function(){
  const selectedWeek = weekSelect.value;
  const q = await getDocs(collection(db,"reports"));

  list.innerHTML = "";

  q.forEach(docSnap=>{
    const data = docSnap.data();

    if(data.week !== selectedWeek) return;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <p><b>Industry:</b> ${data.industry}</p>
      <p><b>Business:</b> ${data.business}</p>
      <p><b>Growth:</b> ${data.growth}</p>
      <p>Status: ${data.reviewed ? "✅ Reviewed" : "❌ Not reviewed"}</p>

      <textarea id="c-${docSnap.id}" placeholder="Mentor comment">${data.comment || ""}</textarea>
      <button onclick="review('${docSnap.id}')">Review</button>
    `;

    list.appendChild(div);
  });
}

/* REVIEW */
window.review = async function(id){
  const comment = document.getElementById(c-${id}).value;

  await updateDoc(doc(db,"reports",id),{
    reviewed:true,
    comment:comment
  });

  alert("Reviewed!");
  load();
}

/* CHART */
import "https://cdn.jsdelivr.net/npm/chart.js";

setTimeout(()=>{
const ctx=document.getElementById('chart');

new Chart(ctx,{
  type:'radar',
  data:{
    labels:['Industry','Business','Growth'],
    datasets:[{
      label:'Skill',
      data:[3,4,5]
    }]
  }
});
},1000);

</script>

</body>
</html>
